<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Muse Player</title>
    <link rel='stylesheet' href='main.css'>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col justify-center items-center w-vw h-dvh">
    <div class="flex flex-col justify-center items-center">
        <h1 class="font-bold text-3xl">Muse Player</h1>
        <div>
            <div class="flex gap-4 p-8 items-center">
                <h2>Upload your songs:</h2>
                <input type="file" id="file-uploader" name="file-uploader" accept="audio/*" multiple
                    onchange="filesChanged()" style="display: none;" />
                <input type="button" value='Upload' onclick="document.getElementById('file-uploader').click()"
                    class="p-4 rounded-xl bg-blue-200" />
            </div>
        </div>

        <div>
            <h3 id="now-playing" class="font-semibold">Now playing:</h3>
            <h3>Queue</h3>
            <ul id="playing-next">
            </ul>
        </div>

        <div class="flex gap-4">
            <p id="time">00:00</p>
            <input type="range" min="0" max="0" value="0" id="slider" class="slider" onchange="seek()">
            <p id="duration">00:00</p>
        </div>

        <div id="controls" class="w-full flex items-center">
            <audio src="" id="audio-controller" onloadedmetadata="handleMetaData()" ontimeupdate="updateTime()" preload="metadata">
            </audio>
            <div class="w-full flex gap-4 p-4 justify-center">
                <button onclick="seekBack()" class="w-[10%] shrink-0 rounded-lg bg-blue-200"><<</button>
                <button onclick="play()" id="player" class="w-[25%] shrink-0 rounded-lg bg-blue-200">Play</button>
                <button onclick="shuffle()" class="w-[25%] shrink-0 rounded-lg bg-blue-200">Shuffle</button>
                <button onclick="seekForward()" class="w-[10%] shrink-0 rounded-lg bg-blue-200">>></button>
            </div>
        </div>
    </div>
</body>

<script src="./main.js"></script>

</html>
